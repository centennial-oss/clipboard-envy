apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
  labels:
    app: clipboard-envy
    environment: prod
data:
  database:
    host: db.example.com
    port: 5432
    name: clipboard_db
  features:
    - auto-detection
    - transformations
    - history
  settings:
    maxConnections: 100
    timeout: 30
    retryEnabled: true
  secrets:
    - name: API_KEY
      valueFrom: vault
    - name: DB_PASSWORD
      valueFrom: vault
