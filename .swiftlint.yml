# SwiftLint: https://github.com/realm/SwiftLint
# Run `make lint` (requires SwiftLint: `brew install swiftlint`).
# `make lint` passes `--strict` so warnings fail CI (avoid `swiftlint --fix` without review).

excluded:
  - build
  - dist
  - .build
  - ClipboardEnvy/BuildInfo.generated.swift

disabled_rules:
  # Short names are common in tight loops, parsers, and indices.
  - identifier_name

# Curated opt-in rules (omit closure_end_indentation: very noisy for nested SwiftUI).
opt_in_rules:
  - closure_spacing
  - empty_count
  - empty_enum_arguments
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - identical_operands
  - legacy_multiple
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - weak_delegate
  - yoda_condition

line_length:
  # Match error so long literals in fixtures do not warn; errors still cap runaway lines.
  warning: 4000
  error: 4000
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

file_length:
  warning: 4000
  error: 4000

type_body_length:
  warning: 2500
  error: 2500

function_body_length:
  warning: 150
  error: 200

cyclomatic_complexity:
  warning: 25
  error: 35

large_tuple:
  warning: 4
  error: 6
